name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run organism invariants
        run: python -m unittest discover -s tests -v
      - name: Run deterministic bond kernel tests
        run: node --test tests/*.test.mjs
